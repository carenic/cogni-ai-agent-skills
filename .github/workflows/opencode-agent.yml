---
# See: <https://opencode.ai/docs>
# Note: Keep keys and envs in alphabetical order.
name: OpenCode Agent
# Prevent concurrent runs on the same branch to avoid push conflicts.
# When a new run is triggered, the previous pending run is cancelled.
concurrency:
  cancel-in-progress: false
  group: >-
    ${{
      github.workflow
    }}-${{
      github.event.pull_request.number ||
      github.event.issue.number ||
      github.head_ref ||
      github.ref_name
    }}
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited
  workflow_call:
    inputs:
      agent:
        default: build
        description: Agent to use.
        required: false
        type: string
      model:
        default: ${{ vars.OPENCODE_MODEL_DEFAULT || 'opencode/gemini-3-flash' }}
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        default: cogni-ai
        description: Agent to use.
        options:
          - build
          - cogni-ai
          - compaction
          - plan
          - summary
          - title
        required: false
        type: choice
      model:
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-1
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/glm-4.6
          - opencode/glm-4.7-free
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.1
          - opencode/gpt-5.1-codex
          - opencode/gpt-5.1-codex-max
          - opencode/gpt-5.1-codex-mini
          - opencode/gpt-5.2
          - opencode/gpt-5.2-codex
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/gpt-5.4-pro
          - opencode/grok-code
          - opencode/kimi-k2
          - opencode/kimi-k2-thinking
          - opencode/kimi-k2.5
          - opencode/minimax-m2.1-free
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3-coder
          - opencode/qwen3.6-plus-free
        required: false
        type: choice
      prompt:
        description: Custom prompt to override the default prompt
        required: false
jobs:
  opencode-agent:
    name: Run OpenCode agent
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      contains(github.event.comment.body, '/') ||
      contains(github.event.comment.body, '@')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false  # Prevents Duplicate header: "Authorization" error.
          submodules: recursive
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.12'
      - name: Restore Python user site
        id: python-user-site
        uses: actions/cache@v5.0.1
        with:
          path: ~/.local
          key: ${{ runner.os }}-pip-${{ hashFiles('.devcontainer/requirements.txt') }}
      - name: Install Python dependencies
        if: steps.python-user-site.outputs.cache-hit != 'true'
        run: python -m pip install --user -r .devcontainer/requirements.txt
      - name: Ensure local bin on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      # See: <https://github.com/Cogni-AI-OU/cogni-ai-agent-action/tree/main/opencode>
      - name: Run OpenCode Agent
        uses: Cogni-AI-OU/cogni-ai-agent-action/opencode@main
        with:
          agent: ${{ inputs.agent }}
          model: ${{ inputs.model || vars.OPENCODE_MODEL_DEFAULT || 'opencode/gemini-3-flash' }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          # Keep shell permissions aligned with .vscode/settings.json allowlist and in alphabetical order.
          permissions: |-
            bash:
              '*': deny
              ansible*: allow
              ansible-galaxy*: allow
              ansible-playbook*: allow
              awk*: allow
              continue*: allow
              cp*: allow
              ex*: allow
              gh*: allow
              gh pr review*: deny
              git*: allow
              hexdump*: allow
              links*: allow
              mawk*: allow
              pipx*: allow
              pre-commit*: allow
              printf*: allow
              set*: allow
              time*: allow
              timeout*: allow
              touch*: allow
              true*: allow
              vim*: allow
          prompt: ${{ inputs.prompt || '' }}
